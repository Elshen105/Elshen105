<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="6">
  <defs>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0000">
        <animate attributeName="stop-color"
          values="#ff0000;#ff7700;#ffff00;#00ff00;#0000ff;#8b00ff;#ff0000"
          dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#00ff00">
        <animate attributeName="stop-color"
          values="#00ff00;#0000ff;#8b00ff;#ff0000;#ff7700;#ffff00;#00ff00"
          dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#8b00ff">
        <animate attributeName="stop-color"
          values="#8b00ff;#ff0000;#ff7700;#ffff00;#00ff00;#0000ff;#8b00ff"
          dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  <rect width="100%" height="6" fill="url(#rainbow)" rx="3"/>
</svg>
